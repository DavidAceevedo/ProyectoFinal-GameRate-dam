security:
    # 1. Configuración del hash de contraseñas (Acepta 123456 tal cual)
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'plaintext'

    # 2. Proveedor de usuarios (usando tu entidad Usuario)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Usuario
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                # ESTO EVITA EL ERROR DE "NULL"
                username_parameter: email
                password_parameter: password
                default_target_path: videojuego_index
            logout:
                path: app_logout
                target: videojuego_index

    # 3. Control de acceso
    access_control:
        - { path: ^/videojuego/new, roles: ROLE_USER }
        - { path: ^/videojuego/\d+/edit, roles: ROLE_USER }
